<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000 !important; 
        }

        #weather-frame {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            
            /* FORCE GPU COMPOSITING - Stops CPU from trying to render the map */
            transform: translate3d(0, 0, 0) scaleX(1.34);
            transform-origin: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            
            /* LOW-QUALITY OPTIMIZATION - Disables expensive anti-aliasing */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated; 
            
            /* PREVENT REPAINTING OVERHEAD */
            will-change: transform;
            contain: strict;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // Set to 2 hours (7200000ms) to avoid too many jarring refreshes
        // but enough to prevent the memory leak from crashing the Shield
        setInterval(function() {
            var iframe = document.getElementById('weather-frame');
            var timestamp = new Date().getTime();
            
            /* Hard Reset: We actually clear the src first to force the 
               browser to dump the previous cache/DOM of the iframe. */
            iframe.src = "about:blank"; 
            
            setTimeout(function() {
                iframe.src = "https://v2.weatherscan.net/?Manassas#" + timestamp;
                console.log("RAM Flushed. Reloading Manassas...");
            }, 100); 

        }, 7200000); 
    </script>
</body>
</html>
