<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        /* This forces the website into a background "container" */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Keeps it behind everything */
            pointer-events: none; /* Stops the TV from trying to "click" things inside it */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="bg-layer">
        <iframe src="https://v2.weatherscan.net/?Manassas"></iframe>
    </div>

    <div style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:1;"></div>

</body>
</html>
