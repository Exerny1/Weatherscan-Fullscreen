<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background: #000 !important; /* Changed to solid black to save iPhone GPU draw calls */
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            
            /* THE ENHANCED MAGIC COMBO */
            /* Added 'perspective' and 'backface-visibility' to unlock more frames */
            transform: perspective(1000px) translateZ(0) scaleX(1.34);
            transform-origin: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            
            /* High-Speed Rendering */
            image-rendering: pixelated;
            will-change: transform, contents; /* Tells iPhone to pre-render the radar frames */
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        setInterval(function() {
            var iframe = document.getElementById('weather-frame');
            var location = "Manassas"; 
            iframe.src = "https://v2.weatherscan.net/?" + location + "&t=" + new Date().getTime();
            console.log("Hourly memory purge complete.");
        }, 3600000);
    </script>
</body>
</html>
