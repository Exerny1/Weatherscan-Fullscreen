<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: transparent !important; 
            /* Forces iOS to prioritize the GPU over the CPU */
            -webkit-overflow-scrolling: touch; 
        }

        iframe {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            
            /* YOUR MAGIC COMBO (Do not touch) */
            transform: translateZ(0) scaleX(1.34);
            transform-origin: center;
            
            /* ANTI-LAG THROTTLE */
            /* Tells iPhone: 'Don't try to blend pixels, just draw them raw' */
            image-rendering: pixelated;
            
            /* EXTRA iOS STABILITY */
            /* Prevents the 'flicker' when transitions happen on old iPhones */
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            
            /* Hints to the browser to prepare for motion, 
               reducing the 'choppy' feeling */
            will-change: transform;
        }
    </style>
</head>
<body>
    <iframe src="https://v2.weatherscan.net/?Manassas"></iframe>
</body>
</html>
