<!DOCTYPE html>
<html>
<head>
    <style>
        /* 1. LOCK THE BACKGROUND */
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000; 
        }

        /* 2. THE SMALLER IFRAME (THE RAM SAVER) */
        iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            border: none;
            
            /* Smaller base size = way less memory for the Shield */
            width: 1280px; 
            height: 720px;

            /* 3. CENTER & STRETCH BACK TO 16:9 */
            /* translate(-50%, -50%) keeps it dead center */
            /* scale(1.5) blows it up to fill 1080p height */
            /* scaleX(1.34) handles your specific wide-aspect stretch */
            transform: translate(-50%, -50%) scale(1.5) scaleX(1.34);
            
            image-rendering: pixelated;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // Full reset every hour to prevent the Shield from lagging out
        setInterval(function() {
            window.location.reload(true);
        }, 3600000); 
    </script>
</body>
</html>
