<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000; 
        }

        #weather-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            border: none;
            
            /* STRETCH TO 16:9 RATIO */
            /* We make it 134% of the width to crop the black side bars */
            width: 134vw; 
            height: 100vh; 

            /* LOCK TO CENTER */
            transform: translate(-50%, -50%);
            
            /* OPTIMIZATIONS FOR SHIELD */
            image-rendering: pixelated;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // Full reset every hour to clear Android TV memory leaks
        setInterval(function() {
            window.location.reload(); 
        }, 3600000); 
    </script>
</body>
</html>
