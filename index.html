<!DOCTYPE html>
<html>
<head>
    <style>
        /* Keeping it transparent to prevent the "Black Background" takeover */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background: transparent !important; 
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            
            /* THE MAGIC COMBO */
            /* translateZ(0) - The hack that fixed your black screen/refresh */
            /* scaleX(1.34) - The 16:9 stretch */
            transform: translateZ(0) scaleX(1.34);
            transform-origin: center;
            
            /* Performance throttle for iPhone 7 / Shield */
            image-rendering: pixelated;
            will-change: transform;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // THE 20-MINUTE AUTO-REFRESH
        // 1,200,000 milliseconds = 20 minutes
        setInterval(function() {
            var iframe = document.getElementById('weather-frame');
            // We just re-set the source to itself. 
            // This clears the browser's cache/RAM without a full page flicker.
            iframe.src = iframe.src;
            console.log("Memory cleared: 20-minute refresh complete.");
        }, 1200000);
    </script>
</body>
</html>
