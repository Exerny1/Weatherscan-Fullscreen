<!DOCTYPE html>
<html>
<head>
    <style>
        /* Transparent body so NO background color can hide the iframe */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background: transparent !important; 
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            /* This 'transform' line forces the TV to use its graphics chip 
               differently, which can sometimes "wake up" a black screen */
            transform: translateZ(0);
            will-change: transform;
        }
    </style>
</head>
<body>
    <iframe src="https://v2.weatherscan.net/?Manassas"></iframe>
</body>
</html>
