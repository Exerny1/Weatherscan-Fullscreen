<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000 !important; 
        }

        iframe {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            
            /* STRETCH & GPU LOCK */
            transform: translate3d(0, 0, 0) scaleX(1.34);
            transform-origin: center;
            
            /* THE CRASH FIXES (EXTERNAL CONTROL) */
            image-rendering: pixelated; 
            filter: brightness(1.0) contrast(1.1); /* Forces a simple hardware layer */
            pointer-events: none; /* Stops the browser from "listening" to the iframe */
            
            /* Limits the browser's "Paint" area to exactly what you see */
            contain: strict; 
            will-change: transform;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // Force a total browser memory wipe every 45 minutes
        setInterval(function() {
            console.log("Hard Resetting Browser RAM...");
            window.location.reload(true); 
        }, 2700000); 
    </script>
</body>
</html>
