<!DOCTYPE html>
<html>
<head>
    <style>
        /* Keeping it transparent to prevent background interference */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background: transparent !important; 
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            
            /* THE MAGIC COMBO */
            /* 1. translateZ(0) - STOPS BLACK SCREEN/REFRESH GLITCH */
            /* 2. scaleX(1.34) - STRETCHES TO 16:9 */
            transform: translateZ(0) scaleX(1.34);
            transform-origin: center;
            
            /* Performance throttle for older devices (iPhone 7/Shield) */
            image-rendering: pixelated;
            will-change: transform;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // THE 1-HOUR AUTO-REFRESH
        // 3,600,000 ms = 60 minutes
        setInterval(function() {
            var iframe = document.getElementById('weather-frame');
            
            // We use a timestamp hack (?t=...) to force a 100% clean refresh
            // This bypasses the 'cache' that usually causes TVs to crash.
            var currentSrc = iframe.src.split('?')[0]; 
            var location = "Manassas"; // Keep your location locked
            iframe.src = "https://v1.weatherscan.net/?" + location + "&t=" + new Date().getTime();
            
            console.log("Hourly memory purge complete.");
        }, 3600000);
    </script>
</body>
</html>
