<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000; 
        }

        #weather-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            border: none;
            
            /* FORCE 16:9 RATIO (1920x1080 logic) */
            width: 1920px;
            height: 1080px;

            /* CENTER AND STRETCH */
            /* 0.53 fits a 1080p frame into a 1080p screen height-wise */
            /* 0.70+ starts stretching it horizontally to 16:9 or wider */
            transform: translate(-50%, -50%) scale(0.6); 
            
            /* PERFORMANCE TIPS FOR SHIELD */
            image-rendering: pixelated;
            will-change: transform;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // Full page refresh every hour to prevent the Shield from lagging
        setInterval(function() {
            window.location.reload(); 
        }, 3600000); 
    </script>
</body>
</html>
