<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000 !important; 
        }

        iframe {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            
            /* HARDWARE ACCELERATION LOCKS */
            /* translate3d is more stable on Nvidia Shield than translateZ */
            transform: perspective(1000px) translate3d(0, 0, 0) scaleX(1.34);
            transform-origin: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            
            image-rendering: pixelated;
            /* Added 'contain' to stop the browser from over-calculating layout */
            contain: strict;
            will-change: transform;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        setInterval(function() {
            var iframe = document.getElementById('weather-frame');
            var timestamp = new Date().getTime();
            
            // 1. Point to a blank page first to force a RAM flush
            iframe.src = "about:blank";
            
            // 2. Short delay before loading the map back in
            setTimeout(function() {
                iframe.src = "https://v2.weatherscan.net/?Manassas#" + timestamp;
                console.log("RAM Cleared & Frame Reset.");
            }, 100); 

        }, 3600000); // 1 hour interval
    </script>
</body>
</html>
