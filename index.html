<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: #000 !important; 
            overflow: hidden;
        }

        #weather-frame {
            border: none;
            width: 75%; /* Lower base width to save RAM */
            height: 75%; /* Lower base height to save RAM */
            
            /* The 'Zoom' trick: Scales the content without the GPU overhead of transforms */
            zoom: 1.34; 
            
            /* Positioning without 3D transforms */
            position: absolute;
            top: 0;
            left: 0;

            /* Disable all smoothing */
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // Refresh every 30 minutes. 
        // Frequent small refreshes are better for the Shield than one big crash.
        setInterval(function() {
            window.location.reload(); 
        }, 1800000); 
    </script>
</body>
</html>
