<!DOCTYPE html>
<html>
<head>
    <style>
        /* Transparent background as you requested to keep it clean */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background: transparent !important; 
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            
            /* THE MAGIC LINE: DO NOT CHANGE */
            /* translateZ(0) is what stops the refreshing/black screens */
            /* scaleX(1.34) is your 16:9 stretch */
            transform: translateZ(0) scaleX(1.34);
            transform-origin: center;
            
            /* The 'low-quality' cheat to help the iPhone 7 and Shield lag */
            image-rendering: pixelated;
            
            will-change: transform;
        }
    </style>
</head>
<body>
    <iframe src="https://v2.weatherscan.net/?Manassas"></iframe>
</body>
</html>
