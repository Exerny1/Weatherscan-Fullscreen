<!DOCTYPE html>
<html>
<head>
    <style>
        /* Keeping it transparent to prevent the "Black Background" takeover */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background: transparent !important; 
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            
            /* THE MAGIC COMBO */
            /* 1. translateZ(0) - The hack that fixed your black screen/refresh */
            /* 2. scaleX(1.34) - The 16:9 stretch */
            transform: translateZ(0) scaleX(1.34);
            transform-origin: center;
            
            /* 3. PERFORMANCE THROTTLE */
            /* Tells the GPU to ignore 'smoothing' pixels, 
               which is the #1 cause of lag on the iPhone 7 */
            image-rendering: pixelated;
            
            /* 4. SHIELD STABILITY */
            /* Tells the browser this layer is 'static', 
               preventing the Shield from over-calculating animations */
            will-change: transform;
        }
    </style>
</head>
<body>
    <iframe src="https://v2.weatherscan.net/?Manassas"></iframe>
</body>
</html>
