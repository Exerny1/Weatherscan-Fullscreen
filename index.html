<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000 !important; 
        }

        #scaler {
            /* We render the site at 80% size to save RAM, 
               then scale it back up to fill the screen */
            width: 100%;
            height: 100%;
            transform: scale(1.0) translateZ(0); 
            transform-origin: top left;
        }

        iframe {
            /* THE MAGIC COMBO: Stretch + Hardware Acceleration + Low Quality */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            
            /* FORCED 16:9 WARP */
            transform: scaleX(1.34) translateZ(0);
            transform-origin: center;

            /* Saves CPU by not 'smoothing' the radar/text */
            image-rendering: pixelated; 
            
            /* Performance Flags */
            will-change: transform;
            backface-visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="scaler">
        <iframe src="https://v2.weatherscan.net/?Manassas"></iframe>
    </div>
</body>
</html>
