<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000; 
        }

        #weather-frame {
            /* 1. SHRINK THE SOURCE DIMENSIONS */
            /* This forces the emulator to render at a lower internal resolution */
            width: 1280px; 
            height: 720px;
            border: none;

            /* 2. ZOOM IT BACK UP */
            /* We use a combination of top/left and transform to center and stretch */
            position: absolute;
            top: 50%;
            left: 50%;
            
            /* scaleX(1.34) for your aspect ratio, 
               multiplied by the scale needed to fill the screen height (1.5 for 720p to 1080p) */
            transform: translate(-50%, -50%) scale(1.5) scaleX(1.34);
            
            /* 3. OPTIMIZE FOR THE STRETCH */
            image-rendering: pixelated; /* Keeps text readable even when stretched */
            will-change: transform;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // Use a full page reload every 60 mins to clear the cache entirely
        setInterval(function() {
            window.location.reload(true);
        }, 3600000); 
    </script>
</body>
</html>
