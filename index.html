<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherScan Stretched</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: black; 
            cursor: none;
        }

        #wrapper {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        iframe {
            /* We set the initial size to a standard 4:3 ratio base */
            width: 100vw;
            height: 100vh;
            border: none;
            position: absolute;
            top: 0;
            left: 0;

            /* THE STRETCH LOGIC */
            /* scaleX(1.33) stretches the width by 33% to fill 16:9 */
            /* translateZ(0) keeps your hardware acceleration active */
            transform: scaleX(1.34) translateZ(0);
            transform-origin: center;
            
            /* Ensures the browser doesn't try to be "smart" and maintain aspect ratio */
            object-fit: fill;
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>
    </div>

    <script>
        // Silent refresh every 60 minutes to prevent the lag/crash
        setInterval(function() {
            var iframe = document.getElementById('weather-frame');
            iframe.src = iframe.src;
        }, 3600000); 
    </script>

</body>
</html>
