<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: #000 !important; 
        }

        #weather-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            
            /* No 3D transforms - they eat VRAM over time */
            zoom: 1.34;
            
            /* Tell the Shield to prioritize speed over quality */
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <iframe id="weather-frame" src="https://v2.weatherscan.net/?Manassas"></iframe>

    <script>
        // Refresh every 20 minutes (1200000ms)
        // This is the "sweet spot" before the Shield's RAM hits the 1GB limit
        setTimeout(function() {
            // 1. Wipe the iframe to signal the browser to release memory
            document.getElementById('weather-frame').src = "about:blank";
            
            // 2. Kill the whole page and start over
            // This is the only way to 100% clear Android TV cache
            window.location.reload(true); 
        }, 1200000); 
    </script>
</body>
</html>
