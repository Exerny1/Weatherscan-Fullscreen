<!DOCTYPE html>
<html>
<head>
    <style>
        /* Keeping it transparent to prevent the "Black Background" takeover */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background: transparent !important; 
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            
            /* STRETCH + HARDWARE HACK COMBINED */
            /* translateZ(0) is what stopped your refresh/black screen */
            /* scaleX(1.34) is what stretches it to 16:9 */
            transform: translateZ(0) scaleX(1.34);
            transform-origin: center;
            
            will-change: transform;
        }
    </style>
</head>
<body>
    <iframe src="https://v2.weatherscan.net/?Manassas"></iframe>
</body>
</html>
